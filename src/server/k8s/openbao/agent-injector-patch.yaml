apiVersion: apps/v1
kind: Deployment
metadata:
  name: mallard-server
  namespace: mallard
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mallard"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/mallard/server"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/mallard/server" -}}
          export API_KEYS="{{ .Data.data.api_keys }}"
          export MQTT_CREDENTIALS="{{ .Data.data.mqtt_credentials }}"
          export INFLUX_TOKEN="{{ .Data.data.influx_token }}"
          {{- end }}
