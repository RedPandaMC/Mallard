# Base for the secret-manager overlays (k8s/infisical/, k8s/openbao/), both of
# which reference `../server` as a resource. Without this file, kustomize
# cannot resolve the base and `kubectl apply -k` fails for either overlay.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - redis.yaml

# Central image pin — override per release (e.g. `kustomize edit set image
# ghcr.io/redpandamc/mallard-server=ghcr.io/redpandamc/mallard-server:<sha>`) so
# a rollout/rollback always targets an immutable tag.
images:
  - name: ghcr.io/redpandamc/mallard-server
    newTag: v1.0.0
