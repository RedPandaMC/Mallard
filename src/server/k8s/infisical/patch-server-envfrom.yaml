apiVersion: apps/v1
kind: Deployment
metadata:
  name: mallard-server
  namespace: mallard
spec:
  template:
    spec:
      containers:
        - name: mallard-server
          envFrom:
            - configMapRef:
                name: mallard-server-config
            - secretRef:
                name: mallard-server-secrets
            - secretRef:
                name: mallard-infisical-secrets
          env:
            - name: SECRET_MANAGER_TYPE
              value: "infisical"
            # Base URL only — the verifier appends /api/v3/... itself. (The
            # server also strips a trailing /api defensively; see
            # Settings.secret_manager_base_url.)
            - name: SECRET_MANAGER_URL
              value: "http://infisical.infisical.svc.cluster.local"
            - name: INFISICAL_ENV_SLUG
              value: "prod"
