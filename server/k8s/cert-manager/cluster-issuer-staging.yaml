# BEFORE APPLYING: replace admin@example.com with your real email address.
# Let's Encrypt uses this to notify you about certificate expiry.
# Quick one-liner: sed -i "s/admin@example.com/${ACME_EMAIL}/" cluster-issuer-staging.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@example.com   # Replace with your real email before applying
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
