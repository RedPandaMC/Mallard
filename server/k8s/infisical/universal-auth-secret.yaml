# Bootstrap credentials for the Infisical Operator.
# Obtain clientId and clientSecret from the Infisical UI:
#   Organization → Machine Identities → Create → Universal Auth
# Then apply:
#   kubectl apply -f universal-auth-secret.yaml -n mallard
apiVersion: v1
kind: Secret
metadata:
  name: infisical-universal-auth-credentials
  namespace: mallard
type: Opaque
stringData:
  clientId: "REPLACE_WITH_CLIENT_ID"
  clientSecret: "REPLACE_WITH_CLIENT_SECRET"
