apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mallard-ingress
  namespace: mallard
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - mallard.example.com
      secretName: mallard-tls
  rules:
    - host: mallard.example.com
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: mallard-server
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mallard-server
                port:
                  number: 8080
