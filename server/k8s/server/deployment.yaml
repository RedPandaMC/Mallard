apiVersion: apps/v1
kind: Deployment
metadata:
  name: mallard-server
  namespace: mallard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mallard-server
  template:
    metadata:
      labels:
        app: mallard-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mallard-server
          image: ghcr.io/redpandamc/mallard-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mallard-server-config
            - secretRef:
                name: mallard-server-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
