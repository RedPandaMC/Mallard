# Mallard BYO Server — Docker Compose
# Usage: cp .env.example .env && docker compose up -d
# Access Grafana at http://localhost:3000 (admin / see .env GF_SECURITY_ADMIN_PASSWORD)

version: "3.9"

services:
  # ── InfluxDB v2 ─────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:?required}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-mallard}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:?required}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mallard FastAPI ingest server ───────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:?required}
      INFLUX_ORG: ${INFLUX_ORG:-mallard}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-metrics}
      API_KEYS: ${API_KEYS:?required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RATE_LIMIT: ${RATE_LIMIT:-60/minute}
    depends_on:
      influxdb:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3000}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUX_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx TLS reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - server
      - grafana
    # Generate a self-signed TLS certificate on first start, then launch nginx
    entrypoint: >
      sh -c "
        if [ ! -f /etc/nginx/certs/server.crt ]; then
          apk add --no-cache openssl &&
          mkdir -p /etc/nginx/certs &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout /etc/nginx/certs/server.key
            -out /etc/nginx/certs/server.crt
            -subj '/CN=mallard-server/O=Mallard/C=US';
        fi &&
        nginx -g 'daemon off;'
      "

volumes:
  influxdb_data:
  grafana_data:
  nginx_certs:
