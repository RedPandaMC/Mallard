<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Weevil — top-down geometric mark. Symmetric about x=256.
       Single ink color via currentColor so it adapts to any theme;
       eyes are negative-space holes (fill-rule evenodd). -->
  <g fill="#141414">
    <!-- ── Appendages: drawn once on the right, mirrored to the left ── -->
    <g id="limbs" stroke="#141414" stroke-linecap="round" stroke-linejoin="round">
      <!-- Antenna (geniculate / elbowed — the weevil signature) -->
      <path d="M262 150 L300 126" stroke-width="15" />
      <path d="M300 126 L322 86" stroke-width="14" />
      <ellipse cx="324" cy="78" rx="11" ry="15" transform="rotate(24 324 78)" stroke="none" />

      <!-- Front leg -->
      <path d="M298 250 L352 214" stroke-width="16" />
      <path d="M362 204 L398 178" stroke-width="13" />
      <circle cx="402" cy="174" r="8" stroke="none" />

      <!-- Middle leg -->
      <path d="M372 300 L432 290" stroke-width="16" />
      <path d="M444 288 L486 282" stroke-width="13" />
      <circle cx="490" cy="281" r="8" stroke="none" />

      <!-- Hind leg -->
      <path d="M356 372 L414 410" stroke-width="16" />
      <path d="M424 418 L462 452" stroke-width="13" />
      <circle cx="466" cy="456" r="8" stroke="none" />
    </g>
    <use href="#limbs" transform="matrix(-1 0 0 1 512 0)" />

    <!-- ── Central body (symmetric, drawn once) ── -->

    <!-- Snout / rostrum -->
    <path d="M244 168 L244 104 Q244 80 256 80 Q268 80 268 104 L268 168 Z" />

    <!-- Head with two negative-space eyes -->
    <path fill-rule="evenodd" d="
      M256 150
      L210 172 L200 210 L226 240 L286 240 L312 210 L302 172 Z
      M222 198 m-13 0 a13 13 0 1 0 26 0 a13 13 0 1 0 -26 0 Z
      M290 198 m-13 0 a13 13 0 1 0 26 0 a13 13 0 1 0 -26 0 Z
    " />

    <!-- Pronotum (thorax) -->
    <path d="M218 240 L294 240 L308 286 L204 286 Z" />

    <!-- Elytra: two faceted halves with a central seam gap.
         Each half is split into an upper and lower panel by a thin gap. -->
    <!-- right upper -->
    <path d="M262 262 L312 272 L374 300 L384 340 L372 376 L262 372 Z" />
    <!-- right lower -->
    <path d="M262 384 L368 388 L356 414 L322 450 L286 474 L262 482 Z" />
    <!-- left upper -->
    <path d="M250 262 L200 272 L138 300 L128 340 L140 376 L250 372 Z" />
    <!-- left lower -->
    <path d="M250 384 L144 388 L156 414 L190 450 L226 474 L250 482 Z" />
  </g>
</svg>
