name: Security

# CodeQL (TypeScript) lives in ci.yml, not here — it only understands the
# extension's javascript-typescript source, and this workflow's push trigger
# is scoped to server/IaC paths. Keeping it here meant a direct push to main
# touching only extension files would never trigger it.

on:
  push:
    branches: [main]
    paths:
      - "src/server/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
  # Fires after Server CI finishes on main — ensures the image is already pushed
  # before we try to scan it.
  workflow_run:
    workflows: ["Server CI"]
    types: [completed]
    branches: [main]
  # Weekly drift scan: catches new CVEs even when no code changed.
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write  # upload SARIF → GitHub Security tab
  packages: read          # pull ghcr.io image for image scans

jobs:
  # ── Dependency review (PRs only) ────────────────────────────────────────────
  # Blocks a PR if it introduces a new dependency with a known HIGH/CRITICAL CVE.
  # Scans whatever manifests changed (npm or pip), not path-restricted.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ── IaC / repo scan ────────────────────────────────────────────────────────
  # Runs on every PR and every push — scans Dockerfile, K8s YAML, Python deps.
  trivy-iac:
    name: Trivy IaC & repo scan
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem / IaC)
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master, pinned — was a floating branch ref
        with:
          scan-type: fs
          scan-ref: "."
          scanners: "vuln,misconfig,secret"
          format: sarif
          output: trivy-iac.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Exclude files that Trivy cannot evaluate correctly:
          #   patch-server-envfrom.yaml / patch-server-env.yaml — kustomize strategic-merge
          #     patches; each only lists env/envFrom, so Trivy sees an incomplete container
          #     spec and flags missing securityContext/resources/probes that the base
          #     Deployment (src/server/k8s/server/) already sets.
          #   secrets.yaml.example (root, infisical, openbao) — template files with
          #     CHANGE_ME placeholders, not real credentials.
          skip-files: "src/server/k8s/infisical/patch-server-envfrom.yaml,src/server/k8s/openbao/patch-server-env.yaml,src/server/k8s/secrets.yaml.example,src/server/k8s/infisical/secrets.yaml.example,src/server/k8s/openbao/secrets.yaml.example"

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ── Kubernetes manifest scan ────────────────────────────────────────────────
  # Runs on every PR and push; uses NSA + MITRE frameworks. Findings surface in
  # the GitHub Security tab — the action does not support exit-code-based
  # build failure, so use continue-on-error to avoid blocking on known gaps.
  kubescape:
    name: Kubescape K8s scan
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Kubescape
        # Run directly on the Ubuntu runner (not via Docker) to avoid Alpine
        # curl incompatibilities in kubescape/github-action@main.
        run: |
          curl -sL https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | bash
          echo "$HOME/.kubescape/bin" >> "$GITHUB_PATH"
        continue-on-error: true

      - name: Run Kubescape (NSA + MITRE)
        run: |
          kubescape scan framework NSA,MITRE src/server/k8s/ \
            --format sarif \
            --output results.sarif \
            --severity-threshold high || true
        continue-on-error: true

      - name: Upload Kubescape SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && hashFiles('results.sarif') != '' && github.event_name != 'pull_request'
        with:
          sarif_file: results.sarif
          category: kubescape

  # ── Container image CVE scan (Trivy) ───────────────────────────────────────
  # Runs after Server CI pushes the image to GHCR, and on the weekly schedule.
  # Does NOT fail the build — new CVEs in python:3.12-slim should be visible in
  # the Security tab without blocking unrelated PRs.
  trivy-image:
    name: Trivy image scan
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master, pinned — was a floating branch ref
        with:
          scan-type: image
          image-ref: ghcr.io/redpandamc/mallard-server:latest
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── Docker Scout CVE + recommendations ─────────────────────────────────────
  # Optional: requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets.
  # If those secrets are not configured, the job fails gracefully (continue-on-error)
  # without blocking CI. Add them in Settings → Secrets → Actions.
  docker-scout:
    name: Docker Scout
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true  # graceful skip when DOCKERHUB_TOKEN is not configured
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (required by Scout)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@7520205ff60037fdc436b40b6a1d1e55a839ec2d # v1.22.0
        with:
          command: cves,recommendations
          image: ghcr.io/redpandamc/mallard-server:latest
          only-severities: high,critical
          ignore-unfixed: true
          sarif-file: scout.sarif

      - name: Upload Docker Scout SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: scout.sarif
          category: docker-scout
