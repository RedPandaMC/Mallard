name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (host + webview)
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Build bundles
        run: bun run package

      - name: Compile integration tests
        run: bun run compile-tests

      - name: Integration tests (headless)
        run: xvfb-run -a bun run test
