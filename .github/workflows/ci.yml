name: Extension CI

on:
  push:
    branches: [main]
    paths: &extension-paths
      - "src/extension-backend/**"
      - "src/extension-frontend/**"
      - "test/**"
      - "schemas/**"
      - "media/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "esbuild.mjs"
      - "eslint.config.mjs"
      - ".vscode-test.mjs"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-toolchain/**"
      - ".github/codeql/**"
  pull_request:
    branches: [main]
    paths: *extension-paths

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-toolchain

      - name: Audit Node dependencies (bun audit)
        run: bun audit --level high --production

      - name: Type-check (host + webview)
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Coverage
        run: bun run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build bundles
        run: bun run package

      - name: Compile integration tests
        run: bun run compile-tests

      - name: Cache VS Code binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.vscode-test
          key: vscode-test-${{ runner.os }}-stable-${{ hashFiles('.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-stable-
            vscode-test-${{ runner.os }}-

      - name: Integration tests (headless)
        run: xvfb-run -a bun vscode-test

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-toolchain

      - name: Package .vsix
        run: bun run vsce:package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mallard-vsix
          path: "*.vsix"
          retention-days: 90

  # CodeQL only understands javascript-typescript (see .github/codeql/codeql-config.yml),
  # i.e. this extension's own source — it lives here, not in security.yml, so its
  # trigger scope matches what it actually scans instead of security.yml's
  # server/IaC-focused paths (a direct push to main touching only extension files
  # would never have triggered it there, since that workflow's push trigger is
  # scoped to src/server/**).
  codeql:
    name: CodeQL (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: javascript-typescript
          config-file: .github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3

      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: codeql-typescript
