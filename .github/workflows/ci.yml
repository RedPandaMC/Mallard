name: Extension CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (host + webview)
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Coverage
        run: bun run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build bundles
        run: bun run package

      - name: Compile integration tests
        run: bun run compile-tests

      - name: Cache VS Code binary
        uses: actions/cache@v4
        with:
          path: ~/.vscode-test
          key: vscode-test-${{ runner.os }}-stable-${{ hashFiles('.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-stable-
            vscode-test-${{ runner.os }}-

      - name: Integration tests (headless)
        run: xvfb-run -a bun vscode-test

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package .vsix
        run: bun run vsce:package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: mallard-vsix
          path: "*.vsix"
          retention-days: 90
