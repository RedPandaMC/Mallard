name: Extension CI

on:
  push:
    branches: [main]
    paths: &extension-paths
      - "src/extension-backend/**"
      - "src/extension-frontend/**"
      - "test/**"
      - "schemas/**"
      - "media/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "esbuild.mjs"
      - "eslint.config.mjs"
      - ".vscode-test.mjs"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-toolchain/**"
      - ".github/codeql/**"
  pull_request:
    branches: [main]
    paths: *extension-paths

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-toolchain

      - name: Audit Node dependencies (bun audit)
        run: bun audit --level high --production

      - name: Type-check (host + webview)
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Coverage
        run: bun run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build bundles
        run: bun run package

      - name: Compile integration tests
        run: bun run compile-tests

      - name: Cache VS Code binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.vscode-test
          key: vscode-test-${{ runner.os }}-stable-${{ hashFiles('.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-stable-
            vscode-test-${{ runner.os }}-

      - name: Integration tests (headless)
        run: xvfb-run -a bun vscode-test

  package:
    name: Package .vsix (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        # One VSIX per platform: the DuckDB native binding ships inside the
        # package, so a universal VSIX would either bundle every platform's
        # ~35-70 MB binding or break on platforms without one. Packing is
        # filesystem-only (no native code runs), so every target builds on
        # ubuntu-latest.
        target:
          - win32-x64
          - win32-arm64
          - linux-x64
          - linux-arm64
          - alpine-x64
          - darwin-x64
          - darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-toolchain

      - name: Keep only the ${{ matrix.target }} DuckDB binding
        run: bun run prune-duckdb ${{ matrix.target }}

      - name: Package .vsix
        run: bun run vsce:package -- --target ${{ matrix.target }}

      - name: Enforce VSIX size budget
        # A regression back to bundling all platform bindings would inflate the
        # artifact to ~175 MB+; one binding keeps it well under this budget.
        run: |
          size=$(stat -c%s *.vsix)
          echo "VSIX size: $((size / 1024 / 1024)) MB"
          if [ "$size" -gt $((120 * 1024 * 1024)) ]; then
            echo "::error::VSIX exceeds the 120 MB budget — are multiple DuckDB bindings bundled?"
            exit 1
          fi

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mallard-${{ matrix.target }}
          path: "*.vsix"
          retention-days: 90

  # CodeQL only understands javascript-typescript (see .github/codeql/codeql-config.yml),
  # i.e. this extension's own source — it lives here, not in security.yml, so its
  # trigger scope matches what it actually scans instead of security.yml's
  # server/IaC-focused paths (a direct push to main touching only extension files
  # would never have triggered it there, since that workflow's push trigger is
  # scoped to src/server/**).
  codeql:
    name: CodeQL (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: javascript-typescript
          config-file: .github/codeql/codeql-config.yml

      - uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: codeql-typescript
