name: Server CI

on:
  push:
    branches: [main]
    paths: ["server/**"]
  pull_request:
    paths: ["server/**"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      influxdb:
        image: influxdb:2
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: testpassword
          DOCKER_INFLUXDB_INIT_ORG: mallard
          DOCKER_INFLUXDB_INIT_BUCKET: metrics
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: testtoken
        ports:
          - "8086:8086"
        options: >-
          --health-cmd "curl -f http://localhost:8086/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: server
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: server
        env:
          INFLUX_URL: http://localhost:8086
          INFLUX_TOKEN: testtoken
          INFLUX_ORG: mallard
          INFLUX_BUCKET: metrics
          API_KEYS: testkey
        run: pytest --cov=src --cov-report=xml -v

      - uses: codecov/codecov-action@v5
        with:
          files: server/coverage.xml
          flags: server
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-push:
    name: Build & Push Image
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/redpandamc/mallard-server:latest
            ghcr.io/redpandamc/mallard-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
