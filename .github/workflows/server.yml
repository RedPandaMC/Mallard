name: Server CI

on:
  push:
    branches: [main]
    paths: ["src/server/**", "pyproject.toml"]
  pull_request:
    paths: ["src/server/**", "pyproject.toml"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      influxdb:
        image: influxdb:2
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: testpassword
          DOCKER_INFLUXDB_INIT_ORG: mallard
          DOCKER_INFLUXDB_INIT_BUCKET: metrics
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: testtoken
        ports:
          - "8086:8086"
        options: >-
          --health-cmd "curl -f http://localhost:8086/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Audit Python dependencies (pip-audit)
        run: pip-audit --skip-editable

      - name: Security scan (bandit)
        run: bandit -r src/server -x src/server/tests -ll

      - name: Run tests
        env:
          INFLUX_URL: http://localhost:8086
          INFLUX_TOKEN: testtoken
          INFLUX_ORG: mallard
          INFLUX_BUCKET: metrics
          API_KEYS: testkey
        run: pytest --cov=server --cov-report=xml -v

      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.xml
          flags: server
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-push:
    name: Build & Push Image
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: src/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/redpandamc/mallard-server:latest
            ghcr.io/redpandamc/mallard-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
