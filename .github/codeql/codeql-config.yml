name: CodeQL config for Mallard

# Use the security-extended query pack but exclude queries that generate
# unavoidable false positives in VS Code extension + webview code.
queries:
  - uses: security-extended

query-filters:
  # VS Code webview messages are sandboxed to the extension process.
  # Origin is always "vscode-webview://..." — origin checks are now enforced
  # in webview/api.ts and SidebarView.ts, but CodeQL may still flag the
  # inline scripts inside HTML template literals that it cannot fully analyze.
  - exclude:
      id: js/missing-origin-check

  # The webview components build their initial DOM structure with static
  # innerHTML templates (no user data). Dynamic updates use textContent.
  # CodeQL cannot distinguish static template setup from runtime injection.
  # The one genuinely dynamic pattern (CurrencySelector) has been fixed to
  # use replaceChildren + textContent.
  - exclude:
      id: js/xss-through-dom
