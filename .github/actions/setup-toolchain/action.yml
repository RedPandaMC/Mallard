name: Setup Bun + Node toolchain
description: >
  Sets up Bun and Node, then installs dependencies with a frozen lockfile.
  Assumes checkout has already run. Used by every extension/docs job that
  needs bun run — factored out so the four call sites (ci.yml's build and
  package jobs, docs.yml's validate and build jobs) don't each repeat the
  same three steps.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.11

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
